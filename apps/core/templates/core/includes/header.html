{% load static %}
<div class="header">
  <div class="container">
    <div class="logo">
      <a href="{% url 'core:home' %}"><span>O</span>Clock</a>
    </div>
    <div class="header-right">
        {% if request.user.is_authenticated %}
              <a class="account" style="margin-right:1em;" href="{% url 'registration:profile' %}">{{ user.get_username }}</a>              
              <a class="account" href="{% url 'logout' %}">Salir</a>
          {% else %}            
              <a class="account" style="margin-right:1em;{% if request.path|slice:'9:' == '/signup/' %}visibility:hidden;{%endif%}" href="{% url 'registration:signup' %}">Ofresco un show</a>              
              <a class="account" style="{% if request.path|slice:'9:' == '/login/' %}display:none;{%endif%}" href="{% url 'login' %}">Mi cuenta</a>              
					{% endif %}
    </div>
  </div>
</div>
